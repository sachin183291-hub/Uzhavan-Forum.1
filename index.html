<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzhavanForum - Smart Farming AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Critical: Shim process and env immediately to prevent ReferenceErrors
        window.process = { 
            env: { 
                NODE_ENV: 'production',
                API_KEY: '' 
            },
            nextTick: function(fn) { setTimeout(fn, 0); }
        };
        window.global = window;
        
        // Robust Error Reporting
        window.onerror = function(msg, url, line, col, error) {
            console.error("Global error caught:", msg, "at", url, ":", line);
            var root = document.getElementById('root');
            if (root && (!root.children || root.children.length === 0)) {
                root.style.display = 'flex';
                root.style.flexDirection = 'column';
                root.style.alignItems = 'center';
                root.style.justifyContent = 'center';
                root.style.height = '100vh';
                root.style.textAlign = 'center';
                root.style.fontFamily = 'sans-serif';
                root.style.background = '#f9fafb';
                root.innerHTML = '<div style="padding:40px;max-width:400px;background:#fff;border-radius:32px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)">' +
                    '<h1 style="color:#dc2626;font-size:24px;margin-bottom:12px;font-weight:900">System Sync Error</h1>' +
                    '<p style="color:#4b5563;margin-bottom:24px;line-height:1.6">UzhavanForum encountered a version or syntax issue. Please refresh the page.</p>' +
                    '<button onclick="location.reload()" style="background:#059669;color:#fff;border:none;padding:16px 32px;border-radius:16px;font-weight:800;cursor:pointer;width:100%">Reload Application</button>' +
                    '</div>';
            }
            return false;
        };

        window.tailwind = {
            config: {
                darkMode: 'class',
                theme: {
                    extend: {
                        animation: {
                            'fade-in': 'fade-in 0.5s ease-out forwards'
                        },
                        keyframes: {
                            'fade-in': {
                                '0%': { opacity: '0', transform: 'translateY(10px)' },
                                '100%': { opacity: '1', transform: 'translateY(0)' }
                            }
                        }
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .heading-font { font-family: 'Playfair Display', serif; }
        #root:empty::after {
            content: 'UzhavanForum Syncing...';
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #059669;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?external=react,react-dom",
        "@google/genai": "https://esm.sh/@google/genai@1.3.0",
        "react/": "https://esm.sh/react@18.2.0/",
        "react-dom/": "https://esm.sh/react-dom@18.2.0/"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-stone-50 text-stone-900 dark:bg-stone-950 dark:text-stone-100 transition-colors duration-300 antialiased">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
